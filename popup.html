<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Highlight Saver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hs-header" data-testid="hs-header">
      <div class="hs-brand">
        <span class="hs-logo"></span>
        <div>
          <h1 class="hs-title">Highlight Saver</h1>
          <p class="hs-sub" id="hs-count" data-testid="hs-count">0 saved</p>
        </div>
      </div>
      <div class="hs-actions">
        <button class="hs-icon-btn" id="hs-export" data-testid="hs-export-btn" title="Export as JSON">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="hs-icon-btn danger" id="hs-clear" data-testid="hs-clear-btn" title="Clear all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </header>

    <div class="hs-search-wrap">
      <input id="hs-search" data-testid="hs-search-input" class="hs-search" type="text" placeholder="Search your highlights…" />
    </div>

    <main id="hs-list" class="hs-list" data-testid="hs-list">
      <!-- items injected -->
    </main>

    <div id="hs-empty" class="hs-empty" data-testid="hs-empty" hidden>
      <div class="hs-empty-glyph"></div>
      <h3>No highlights yet</h3>
      <p>Select text on any page, then click <em>Save Highlight?</em></p>
    </div>

    <footer class="hs-footer">
      <span>Local-first · <span id="hs-status" data-testid="hs-status">Ready</span></span>
      <a href="#" id="hs-help" data-testid="hs-help">?</a>
    </footer>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
